name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff==0.8.4
      - run: ruff check .

  testes:
    name: Testes + cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Rodar testes com cobertura
        run: pytest --cov=app --cov=ml --cov-report=term-missing --cov-report=xml

      - name: Publicar cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  docker:
    name: Build da imagem Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (valida o Dockerfile)
        run: docker build -t calculadora-pisos-api:ci .
